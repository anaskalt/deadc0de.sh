baseURL = "https://deadc0de.sh/"
locale = "en-US"
title = "deadc0de"
theme = "phosphor"
enableRobotsTXT = true
enableEmojis = true

[pagination]
  pagerSize = 8

[taxonomies]
  tag = "tags"

# Optional: uncomment to enable Google Analytics (the theme already wires it up).
# [services.googleAnalytics]
#   ID = "G-XXXXXXXXXX"

[outputs]
  home = ["html", "rss"]

[params]
  author      = "deadc0de"
  promptUser  = "root"
  promptHost  = "deadc0de"
  description = "A curious guy breaking things and writing about it — security, embedded, and reverse engineering, plus the occasional tangent."
  bio         = "Just a curious guy who takes things apart to see how they work, then writes about it."

  [[params.social]]
    name = "github"
    url  = "https://github.com/anaskalt"
  [[params.social]]
    name = "linkedin"
    url  = "https://www.linkedin.com/in/anastasios-kaltakis"
  [[params.social]]
    name = "rss"
    url  = "/index.xml"

[menu]
  [[menu.main]]
    identifier = "posts"
    name       = "posts"
    pageRef    = "/posts"
    weight     = 1
  [[menu.main]]
    identifier = "about"
    name       = "about"
    pageRef    = "/about"
    weight     = 2

[markup]
  [markup.highlight]
    noClasses   = false
    lineNos     = false
    tabWidth    = 4
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
